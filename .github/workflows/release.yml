name: Release

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      dry_run:
        description: Preview Hooversion without release commits, tags, releases, or images
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-main
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.14
  HOOVERSION_SHA: 799ecf4a9c29e8ce4d5ad7055a6030adf665cf82 # v0.2.0
  GHCR_IMAGE: ghcr.io/${{ github.repository }}
  DOCKERHUB_IMAGE: openhoo/hoomail

jobs:
  release:
    name: Hooversion Release
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        !startsWith(github.event.workflow_run.head_commit.message, 'chore(release):')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      commit: ${{ steps.release_commit.outputs.commit }}
      current: ${{ steps.current.outputs.current || steps.manual_current.outputs.current }}
      published: ${{ steps.release.outputs.published }}
      short_sha: ${{ steps.release_commit.outputs.short_sha }}
      tag: ${{ steps.release.outputs.tag }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: main

      - name: Verify release run matches current main
        id: current
        if: github.event_name == 'workflow_run'
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          actual="$(git rev-parse HEAD)"
          if [ "$actual" = "$EXPECTED_SHA" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
          else
            echo "current=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping stale release run for $EXPECTED_SHA because main is $actual."
          fi

      - name: Mark manual release current
        id: manual_current
        if: github.event_name == 'workflow_dispatch'
        run: echo "current=true" >> "$GITHUB_OUTPUT"

      - name: Set up Bun
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Hooversion
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d "$RUNNER_TEMP/hooversion.XXXXXXXX")"
          echo "HOOVERSION_DIR=$install_dir" >> "$GITHUB_ENV"
          git init "$install_dir"
          git -C "$install_dir" fetch --depth 1 https://github.com/openhoo/hooversion.git "$HOOVERSION_SHA"
          git -C "$install_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$install_dir" rev-parse HEAD)" = "$HOOVERSION_SHA"
          cd "$install_dir"
          bun install --frozen-lockfile

      - name: Configure release git author
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Release
        id: release
        if: steps.current.outputs.current == 'true' || steps.manual_current.outputs.current == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          args=(release)
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          bun "$HOOVERSION_DIR/src/cli.ts" "${args[@]}"

      - name: Resolve release commit
        id: release_commit
        if: steps.release.outputs.published == 'true'
        env:
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          commit="$(git rev-parse "${RELEASE_TAG}^{commit}")"
          echo "commit=$commit" >> "$GITHUB_OUTPUT"
          echo "short_sha=${commit:0:7}" >> "$GITHUB_OUTPUT"

      - name: Remove Hooversion checkout
        if: always()
        run: test -z "${HOOVERSION_DIR:-}" || rm -rf "$HOOVERSION_DIR"

  publish-image:
    name: Publish images
    needs: release
    if: needs.release.outputs.current == 'true' && needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      artifact-metadata: write
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          ref: ${{ needs.release.outputs.tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.version }}
            type=raw,value=sha-${{ needs.release.outputs.short_sha }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.revision=${{ needs.release.outputs.commit }}
            org.opencontainers.image.version=${{ needs.release.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - name: Build and push image
        id: push
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          build-args: VERSION=${{ needs.release.outputs.version }}
          cache-from: type=gha,scope=hoomail-image
          cache-to: type=gha,mode=max,scope=hoomail-image
          context: .
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,compression=zstd,compression-level=19,force-compression=true
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Verify compressed platform images
        env:
          GHCR_IMAGE: ${{ env.GHCR_IMAGE }}
          DOCKERHUB_IMAGE: ${{ env.DOCKERHUB_IMAGE }}
          INDEX_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          set -euo pipefail
          mapfile -t manifests < <(
            docker buildx imagetools inspect --raw "${GHCR_IMAGE}@${INDEX_DIGEST}" |
              jq -r '.manifests[] | select(.platform.os == "linux") | .digest'
          )
          test "${#manifests[@]}" -eq 2
          for manifest in "${manifests[@]}"; do
            details="$(docker buildx imagetools inspect --raw "${GHCR_IMAGE}@${manifest}")"
            jq -e 'all(.layers[]; .mediaType == "application/vnd.oci.image.layer.v1.tar+zstd")' <<<"${details}"
            size="$(jq '[.layers[].size] | add' <<<"${details}")"
            test "${size}" -le 6291456
          done
          docker buildx imagetools inspect "${DOCKERHUB_IMAGE}@${INDEX_DIGEST}" > /dev/null

      - name: Generate artifact attestation
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4
        with:
          subject-name: ${{ env.GHCR_IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
