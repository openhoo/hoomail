name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.14
  GO_VERSION: 1.26.5
  HOOVERSION_SHA: 799ecf4a9c29e8ce4d5ad7055a6030adf665cf82 # v0.2.0

jobs:
  commitlint:
    name: Conventional Commits
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install Hooversion
        run: |
          set -euo pipefail
          install_dir="$(mktemp -d "$RUNNER_TEMP/hooversion.XXXXXXXX")"
          echo "HOOVERSION_DIR=$install_dir" >> "$GITHUB_ENV"
          git init "$install_dir"
          git -C "$install_dir" fetch --depth 1 https://github.com/openhoo/hooversion.git "$HOOVERSION_SHA"
          git -C "$install_dir" checkout --detach FETCH_HEAD
          test "$(git -C "$install_dir" rev-parse HEAD)" = "$HOOVERSION_SHA"
          cd "$install_dir"
          bun install --frozen-lockfile

      - name: Lint commits
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            bun "$HOOVERSION_DIR/src/cli.ts" lint \
              --from "${{ github.event.pull_request.base.sha }}" \
              --to "${{ github.event.pull_request.head.sha }}"
          else
            bun "$HOOVERSION_DIR/src/cli.ts" lint --last
          fi

      - name: Remove Hooversion checkout
        if: always()
        run: test -z "${HOOVERSION_DIR:-}" || rm -rf "$HOOVERSION_DIR"

  e2e:
    name: Playwright E2E
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Chromium
        run: bun x playwright install --with-deps chromium

      - name: Test
        run: bun run test:e2e

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  client:
    name: Preact client
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun x tsc --noEmit

      - name: Build
        run: bun run build

  go-test:
    name: Go race tests and coverage
    needs: commitlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      code-quality: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build embedded client
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Test with coverage
        run: go test -race -covermode=atomic -coverprofile=coverage.out ./...

      - name: Convert coverage to Cobertura
        run: go run github.com/boumenot/gocover-cobertura@v1.5.0 -strict < coverage.out > coverage.xml

      - name: Upload coverage report
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@1c15be36fc3733ba839b1dd643bd9556e4426dc1 # v1
        with:
          file: coverage.xml
          language: Go
          label: code-coverage/go

  go-quality:
    name: Go quality
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build embedded client
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l cmd internal web)"

      - name: Vet
        run: go vet ./...

      - name: Verify modules
        run: go mod verify

  go-security:
    name: Go security
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Build embedded client
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Scan reachable Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Scan Go security patterns
        run: go run github.com/securego/gosec/v2/cmd/gosec@v2.28.0 -quiet -exclude=G104,G202,G301,G705 ./...
  helm:
    name: Helm chart
    needs: commitlint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5
        with:
          version: v4.2.3

      - name: Lint chart
        run: helm lint --strict charts/hoomail

      - name: Render chart variants
        run: |
          set -euo pipefail
          helm template hoomail charts/hoomail > /dev/null
          helm template hoomail charts/hoomail \
            --set image.digest=sha256:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa \
            --set persistence.enabled=false \
            --set ingress.enabled=true \
            --set ingress.className=nginx > /dev/null
          helm template hoomail charts/hoomail \
            --set persistence.existingClaim=hoomail-data \
            --set serviceAccount.create=true \
            --set serviceAccount.name=hoomail > /dev/null

      - name: Verify release version synchronization
        run: |
          test "$(sed -n 's/^version: //p' charts/hoomail/Chart.yaml)" = "$(tr -d '\r\n' < internal/version/version)"
          test "$(sed -n 's/^appVersion: "\(.*\)"/\1/p' charts/hoomail/Chart.yaml)" = "$(tr -d '\r\n' < internal/version/version)"

  docker:
    name: Docker build and smoke
    needs:
      - client
      - e2e
      - go-quality
      - go-security
      - go-test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4


      - name: Build image
        run: |
          docker buildx build \
            --build-arg VERSION=0.0.0-ci \
            --cache-from type=gha,scope=hoomail-image \
            --cache-to type=gha,mode=max,scope=hoomail-image \
            --load \
            --tag hoomail:ci \
            .

      - name: Verify embedded version
        run: test "$(docker run --rm hoomail:ci version)" = "0.0.0-ci"

      - name: Smoke HTTP and SMTP
        run: |
          set -euo pipefail
          docker run --rm -d --name hoomail-ci \
            --tmpfs /app/data:rw,noexec,nosuid,uid=65532,gid=65532,size=64m \
            -p 3000:3000 -p 2525:2525 -p 3110:3110 hoomail:ci
          for attempt in $(seq 1 30); do
            if docker exec hoomail-ci /hoomail healthcheck; then
              exit 0
            fi
            sleep 1
          done
          docker logs hoomail-ci
          exit 1

      - name: Remove CI container and image
        if: always()
        run: |
          docker rm -f hoomail-ci 2>/dev/null || true
          docker image rm hoomail:ci 2>/dev/null || true
