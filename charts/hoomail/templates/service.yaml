apiVersion: v1
kind: Service
metadata:
  name: {{ include "hoomail.fullname" . }}
  labels:
    {{- include "hoomail.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http
      protocol: TCP
    - name: smtp
      port: {{ .Values.service.ports.smtp }}
      targetPort: smtp
      protocol: TCP
    - name: pop3
      port: {{ .Values.service.ports.pop3 }}
      targetPort: pop3
      protocol: TCP
  selector:
    {{- include "hoomail.selectorLabels" . | nindent 4 }}
